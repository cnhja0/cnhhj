name: cnhhj_instrutor
description: "CNHhj — Aplicativo para instrutores de aulas práticas de CNH."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ─── Estado e navegação ─────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # ─── Backend ────────────────────────────────────────────────────────
  supabase_flutter: ^2.5.7
  flutter_dotenv: ^5.1.0

  # ─── Persistência local ────────────────────────────────────────────
  shared_preferences: ^2.3.2

  # ─── UI ────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  table_calendar: ^3.1.2
  flutter_animate: ^4.5.0       # animações declarativas (fade, slide, scale)
  phosphor_flutter: ^2.1.0      # ícones modernos (alternativa aos Material)

  # ─── Inputs e formulários ──────────────────────────────────────────
  mask_text_input_formatter: ^2.9.0
  image_picker: ^1.1.2

  # ─── Utilidades ────────────────────────────────────────────────────
  intl: ^0.20.2
  collection: ^1.18.0
  http: ^1.2.0                  # cliente HTTP — API FIPE de marcas/modelos

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  # IMPORTANTE: Flutter NÃO inclui subpastas recursivamente. Cada
  # subdiretório com assets precisa ser listado aqui explicitamente.
  assets:
    - assets/images/
    - assets/images/banners/   # criativos rotativos da Home
    - assets/images/login/     # banner promo do login
    - assets/icons/

  # O `.env` não é declarado como asset porque está no .gitignore — usado
  # apenas localmente. Sem `.env`, o app usa defaults (modo mock).
  # Fontes customizadas via google_fonts em runtime.
